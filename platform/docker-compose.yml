# Production stack — patterns from:
# - Formance Ledger official standalone (github.com/formancehq/ledger)
# - NestJS wallet-system (github.com/sheygs/wallet-system)
# - Stripe API resource model (docs.stripe.com/api)

name: gasfree-platform

volumes:
  ledger_postgres: {}
  app_postgres: {}
  redis_data: {}

services:
  # ── Formance Ledger (programmable financial core — production-grade) ────────
  ledger-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    volumes:
      - ledger_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ledger']
      interval: 5s
      timeout: 5s
      retries: 10

  ledger-worker:
    image: ghcr.io/formancehq/ledger:v2.4.0
    depends_on:
      ledger-postgres:
        condition: service_healthy
    environment:
      POSTGRES_URI: postgresql://ledger:ledger@ledger-postgres/ledger?sslmode=disable
      POSTGRES_MAX_OPEN_CONNS: '40'
      POSTGRES_MAX_IDLE_CONNS: '40'

  ledger:
    image: ghcr.io/formancehq/ledger:v2.4.0
    ports:
      - '3068:3068'
    depends_on:
      ledger-postgres:
        condition: service_healthy
    environment:
      POSTGRES_URI: postgresql://ledger:ledger@ledger-postgres/ledger?sslmode=disable
      POSTGRES_MAX_OPEN_CONNS: '40'
      POSTGRES_MAX_IDLE_CONNS: '40'
      EXPERIMENTAL_FEATURES: 'true'
      AUTO_UPGRADE: 'true'

  # ── App database (metadata, Stripe-like objects, audit) ─────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: gasfree
      POSTGRES_PASSWORD: gasfree
      POSTGRES_DB: gasfree
    volumes:
      - app_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gasfree']
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://gasfree:gasfree@postgres:5432/gasfree
      REDIS_URL: redis://redis:6379
      FORMANCE_LEDGER_URL: http://ledger:3068
      PORT: '3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ledger:
        condition: service_started
